services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Anonymous volume to shield database persistence
      - chroma_data:/app/chroma_db
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - EMBEDDINGS_PROVIDER=local
      - LLM_API_KEY=
      - LLM_API_BASE=https://api.openai.com/v1
      - LLM_MODEL=gpt-3.5-turbo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Shield local node_modules from container collisions
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
