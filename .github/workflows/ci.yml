name: Sarathi CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python Syntax and Compilation Check
        run: |
          # Perform compilation validation check on core modules to verify syntax correctness
          python -m py_compile api/index.py api/rag_engine.py backend/main.py backend/rag_engine.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Vite Application
        working-directory: ./frontend
        run: npm run build
